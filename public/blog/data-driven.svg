<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="Veriye dayalı karar alma">
  <defs>
    <linearGradient id="dd-bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08160e"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </linearGradient>
    <radialGradient id="dd-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(960 120) rotate(130) scale(520)">
      <stop stop-color="#16a34a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dd-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16a34a" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#16a34a" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dd-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#dd-bg)"/>
  <rect width="1200" height="630" fill="url(#dd-grid)"/>
  <rect width="1200" height="630" fill="url(#dd-glow)"/>

  <!-- dashboard panel -->
  <rect x="430" y="190" width="340" height="250" rx="20" fill="#0e1712" stroke="#16a34a" stroke-width="2.5" stroke-opacity="0.6"/>

  <!-- bars -->
  <g fill="#22c55e">
    <rect x="470" y="330" width="34" height="80" rx="6" fill-opacity="0.55"/>
    <rect x="520" y="300" width="34" height="110" rx="6" fill-opacity="0.7"/>
    <rect x="570" y="350" width="34" height="60" rx="6" fill-opacity="0.5"/>
    <rect x="620" y="280" width="34" height="130" rx="6"/>
    <rect x="670" y="320" width="34" height="90" rx="6" fill-opacity="0.6"/>
  </g>

  <!-- trend line + area -->
  <path d="M470 300 L520 280 L570 290 L620 240 L690 220 L730 210 L730 250 L470 250 Z" fill="url(#dd-area)"/>
  <path d="M470 300 L520 280 L570 290 L620 240 L690 220 L730 210" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#0a0a0c" stroke="#22c55e" stroke-width="3.5">
    <circle cx="620" cy="240" r="7"/><circle cx="730" cy="210" r="7"/>
  </g>

  <!-- header dots -->
  <g transform="translate(456 216)" fill="#16a34a">
    <circle cx="0" cy="0" r="5"/><circle cx="18" cy="0" r="5" fill-opacity="0.5"/><circle cx="36" cy="0" r="5" fill-opacity="0.3"/>
  </g>

  <text x="80" y="96" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#ffffff" letter-spacing="0.5">Yezuri<tspan fill="#16a34a">.</tspan></text>
</svg>
