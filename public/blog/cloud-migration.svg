<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="Bulut göçü">
  <defs>
    <linearGradient id="cm-bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a1020"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </linearGradient>
    <radialGradient id="cm-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(960 120) rotate(130) scale(520)">
      <stop stop-color="#2563eb" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <pattern id="cm-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <filter id="cm-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#cm-bg)"/>
  <rect width="1200" height="630" fill="url(#cm-grid)"/>
  <rect width="1200" height="630" fill="url(#cm-glow)"/>

  <!-- upload arrows from servers to cloud -->
  <g stroke="#2563eb" stroke-width="3" opacity="0.5" stroke-dasharray="6 8">
    <path d="M520 430 C540 360 560 340 600 320" fill="none"/>
    <path d="M680 430 C660 360 640 340 600 320" fill="none"/>
  </g>

  <!-- server stacks -->
  <g transform="translate(470 420)">
    <rect x="0" y="0" width="100" height="36" rx="8" fill="#11131c" stroke="#2563eb" stroke-width="2.5"/>
    <rect x="0" y="46" width="100" height="36" rx="8" fill="#11131c" stroke="#2563eb" stroke-width="2.5" stroke-opacity="0.6"/>
    <circle cx="20" cy="18" r="5" fill="#3b82f6"/>
    <circle cx="20" cy="64" r="5" fill="#3b82f6" fill-opacity="0.6"/>
  </g>
  <g transform="translate(630 420)">
    <rect x="0" y="0" width="100" height="36" rx="8" fill="#11131c" stroke="#2563eb" stroke-width="2.5"/>
    <rect x="0" y="46" width="100" height="36" rx="8" fill="#11131c" stroke="#2563eb" stroke-width="2.5" stroke-opacity="0.6"/>
    <circle cx="20" cy="18" r="5" fill="#3b82f6"/>
    <circle cx="20" cy="64" r="5" fill="#3b82f6" fill-opacity="0.6"/>
  </g>

  <!-- cloud -->
  <g filter="url(#cm-soft)" opacity="0.45"><ellipse cx="600" cy="270" rx="150" ry="70" fill="#2563eb"/></g>
  <path d="M520 300 a55 55 0 0 1 8 -108 a70 70 0 0 1 132 -12 a48 48 0 0 1 20 120 Z"
        fill="#11131c" stroke="#3b82f6" stroke-width="3.5"/>
  <path d="M566 250 l24 26 l44 -52" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="80" y="96" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#ffffff" letter-spacing="0.5">Yezuri<tspan fill="#2563eb">.</tspan></text>
</svg>
